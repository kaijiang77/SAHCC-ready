defaults:
  - model: sahcc
  - matcher: sah
  - data: shha
  - trainer: default
  - optimizer: adamw
  - scheduler: steplr
  - _self_

seed: 42
project_name: sahcc
run_name: ${data.name}_${now:%Y%m%d_%H%M%S}

paths:
  log_dir: ./logs
  ckpt_dir: ./weights

eval:
  ckpt_path: ''
  thresholds: [0.4, 0.5, 0.6]
  primary_threshold: 0.5

hydra:
  job:
    chdir: false
